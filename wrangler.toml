name = "atlas-trip-planner"
main = "workers/trip-planner.ts"
compatibility_date = "2024-12-01"

# Environment variables that are NOT secret. The OPENROUTER_API_KEY is set with
# `wrangler secret put OPENROUTER_API_KEY` and is not stored here.
[vars]
# Cheapest viable model for trip planning. Override here if quality drifts.
GEMINI_MODEL = "gemini-flash-lite-latest"

# Allow importing JSON. Wrangler bundles the buyer_tokens.json with the worker.
[build]
command = ""

# Restrict where the Worker can be hit from in production. Add your custom
# domain after `wrangler deploy` completes.
# [[routes]]
# pattern = "atlas.2ushka.com/api/*"
# custom_domain = true
